<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Dashboard | ARVYS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/instructor/style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <div class="avatar" id="instructorAvatar"><span>IN</span></div>
                <div class="greeting">
                    <span class="greeting-text">Welcome back,</span>
                    <h1 class="user-name">Instructor</h1>
                </div>
            </div>
            <div class="logo-box">
                <img src="/student-it/logo/logo.svg" alt="ARVYS Logo" class="brand-logo-large">
            </div>
        </header>

        <main class="page active">
            <section class="class-panel">
                <div class="class-card">
                    <div class="class-header">
                        <h2 class="section-title">Schedule New Class</h2>
                    </div>

                    <form id="createClassForm" class="create-class-form">
                        <div class="form-group">
                            <label for="batchId">Batch</label>
                            <select id="batchId" name="batchId" required>
                                <option value="" disabled selected>Select Batch</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="courseId">Course</label>
                            <select id="courseId" name="courseId" required>
                                <option value="" disabled selected>Select Course</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="date">Date</label>
                                <input type="date" id="date" name="date" required>
                            </div>
                            <div class="form-group">
                                <label for="weekNumber">Week Number</label>
                                <input type="number" id="weekNumber" name="weekNumber" min="1" max="52" required>
                            </div>
                            <div class="form-group">
                                <label for="dayNumber">Day Number</label>
                                <input type="number" id="dayNumber" name="dayNumber" min="1" max="7" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="startTime">Start Time</label>
                                <input type="time" id="startTime" name="startTime" required>
                            </div>
                            <div class="form-group">
                                <label for="endTime">End Time</label>
                                <input type="time" id="endTime" name="endTime" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="title">Class Title</label>
                            <input type="text" id="title" name="title" placeholder="e.g. Introduction to Data Science" required>
                        </div>

                        <div class="form-group">
                            <label for="description">Description (optional)</label>
                            <textarea id="description" name="description" placeholder="Short description of the class"></textarea>
                        </div>

                        <div class="form-group">
                            <label>Subtopics</label>
                            <div id="subtopicsContainer" class="subtopics-list">
                                <!-- Dynamic subtopics will appear here -->
                            </div>
                            <div class="add-subtopic-row">
                                <input type="text" id="newSubtopic" placeholder="Add a subtopic...">
                                <button type="button" id="addSubtopicBtn" class="btn-secondary">Add</button>
                            </div>
                        </div>

                        <button type="submit" class="btn-primary" id="submitBtn">Create Class</button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/instructor/dashboard.js"></script>
</body>
</html>
